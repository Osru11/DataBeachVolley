<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Data Beach Volley</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div id="app">
        <h1>Regístrate en Data Beach Volley</h1>
        <div id="register">
            <h2>Registro</h2>
            <form action="#" method="post">
                <input type="text" id="usuario" placeholder="Usuario" required>
                <input type="password" id="contrasenia" placeholder="Contraseña" required>
                <select id="tipoCuenta" required>
                    <option value="" disabled selected>Seleccione tipo de cuenta</option>
                    <option value="entrenador">Entrenador</option>
                    <option value="jugador">Jugador</option>
                    <option value="estadistico">Estadístico</option>
                </select>
                <button type="submit" id="btn_registro">Registrarse</button>
            </form>
        </div>
    </div>
    <script src="js/registro.js"></script>
</body>
</html>
